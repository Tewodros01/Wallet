services:
  - type: web
    name: wallet-api
    runtime: node
    rootDir: api
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 22
  - type: web
    name: bingo
    runtime: static
    rootDir: app
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
